<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIDI Sample Player</title>
</head>
<body>
<h1>MIDI Sample Player</h1>
<input type="file" id="wavFile" accept=".wav">
<input type="file" id="midiFile" accept=".mid,.midi">
<button id="playBtn">Play MIDI</button>

<script src="https://cdn.jsdelivr.net/npm/@tonejs/midi@2.0.27/build/Midi.min.js"></script>

<script>
const ROOT_NOTE = 70; // Root MIDI note of the sample
const context = new (window.AudioContext || window.webkitAudioContext)();

document.getElementById('playBtn').addEventListener('click', async () => {
    const wavInput = document.getElementById('wavFile').files[0];
    const midiInput = document.getElementById('midiFile').files[0];
    if (!wavInput || !midiInput) {
        alert("Select both WAV and MIDI files!");
        return;
    }

    // Decode sample
    const wavArray = await wavInput.arrayBuffer();
    const sampleBuffer = await context.decodeAudioData(wavArray);

    // Load MIDI
    const midiArray = await midiInput.arrayBuffer();
    const midi = new TonejsMidi.Midi(midiArray);

    const startTime = context.currentTime + 0.5; // slight delay
    midi.tracks.forEach(track => {
        track.notes.forEach(note => {
            const semitoneShift = note.midi - ROOT_NOTE;
            const source = context.createBufferSource();
            source.buffer = sampleBuffer;
            source.playbackRate.value = Math.pow(2, semitoneShift / 12);

            const gainNode = context.createGain();
            gainNode.gain.value = note.velocity / 127;

            source.connect(gainNode).connect(context.destination);
            source.start(startTime + note.time);
        });
    });
});
</script>
</body>
</html>
